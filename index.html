<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American History \u2014 Complete Flashcard Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #12100e;
    --parchment: #f4ead0;
    --parchment-mid: #e2d0a8;
    --gold: #b8860b;
    --gold-light: #d4a820;
    --crimson: #7a1e1e;
    --teal: #1a5c52;
    --teal-light: #2a8c7e;
    --shadow: rgba(18,16,14,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0c0a;
    background-image:
      radial-gradient(ellipse at 10% 30%, #1e1408 0%, transparent 50%),
      radial-gradient(ellipse at 90% 70%, #0a1010 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Crimson Pro', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    color: var(--ink);
  }

  /* \u2500\u2500 HEADER \u2500\u2500 */
  header {
    text-align: center;
    margin-bottom: 28px;
    color: var(--parchment);
    width: 100%;
    max-width: 760px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 4.5vw, 3.2rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    line-height: 1.1;
    letter-spacing: 0.04em;
  }

  header p {
    margin-top: 6px;
    font-size: 1rem;
    color: var(--parchment-mid);
    font-style: italic;
    opacity: 0.75;
  }

  /* \u2500\u2500 ERA FILTER TABS \u2500\u2500 */
  .era-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    justify-content: center;
    max-width: 760px;
    margin: 18px 0 10px;
  }

  .era-tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(212,168,32,0.35);
    background: rgba(212,168,32,0.08);
    color: var(--parchment-mid);
    font-family: 'Crimson Pro', serif;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .era-tab:hover { background: rgba(212,168,32,0.22); }
  .era-tab.active { background: var(--gold); color: #0e0c0a; font-weight: 600; border-color: var(--gold-light); }

  /* \u2500\u2500 PROGRESS \u2500\u2500 */
  .progress-wrap {
    width: 100%;
    max-width: 760px;
    margin: 12px 0 4px;
  }

  .progress-bar-track {
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--gold-light));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 0.82rem;
    color: var(--parchment-mid);
    opacity: 0.6;
  }

  /* \u2500\u2500 DOT NAV \u2500\u2500 */
  .term-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 760px;
    margin: 14px 0 18px;
  }

  .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(212,168,32,0.1);
    border: 1px solid rgba(212,168,32,0.3);
    cursor: pointer;
    transition: all 0.18s;
    font-size: 0.67rem;
    color: var(--parchment-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Pro', serif;
  }

  .dot:hover { background: rgba(212,168,32,0.3); transform: scale(1.12); }
  .dot.active { background: var(--gold); color: #0e0c0a; border-color: var(--gold-light); font-weight: 700; }
  .dot.seen { border-color: var(--teal-light); color: var(--teal-light); }
  .dot.filtered-out { opacity: 0.18; pointer-events: none; }

  /* \u2500\u2500 CARD \u2500\u2500 */
  .card-wrapper {
    width: 100%;
    max-width: 760px;
    perspective: 1500px;
    margin-bottom: 24px;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 540px;
    transform-style: preserve-3d;
    transition: transform 0.72s cubic-bezier(0.4, 0.2, 0.2, 1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 28px 70px rgba(0,0,0,0.65), 0 6px 20px rgba(0,0,0,0.4);
  }

  /* FRONT */
  .card-front {
    background: var(--parchment);
    background-image: linear-gradient(148deg, #faf2da 0%, var(--parchment) 55%, #dfd0a8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 52px 44px 44px;
    border: 3px solid var(--gold);
    position: absolute;
  }

  .card-front::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(184,134,11,0.22);
    border-radius: 9px;
    pointer-events: none;
  }

  .era-badge {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 0.62rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    padding: 3px 11px;
    border-radius: 20px;
    font-weight: 600;
    font-family: 'Crimson Pro', serif;
  }

  .set-badge {
    position: absolute;
    top: 18px;
    left: 18px;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    font-family: 'Crimson Pro', serif;
  }

  .badge-set1 { background: rgba(122,30,30,0.18); color: var(--crimson); border: 1px solid rgba(122,30,30,0.35); }
  .badge-set2 { background: rgba(26,92,82,0.18); color: var(--teal-light); border: 1px solid rgba(26,92,82,0.4); }

  .term-number {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .term-emoji {
    font-size: 3.8rem;
    margin-bottom: 18px;
    filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.18));
  }

  .term-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.45rem, 3.5vw, 2.2rem);
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.25;
    margin-bottom: 14px;
  }

  .flip-hint {
    margin-top: 20px;
    font-size: 0.8rem;
    color: var(--gold);
    font-style: italic;
    opacity: 0.6;
  }

  /* BACK */
  .card-back {
    background: #111008;
    background-image: linear-gradient(158deg, #1c1608 0%, #0c0c0a 100%);
    transform: rotateY(180deg);
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    border: 2px solid var(--gold);
  }

  .back-header {
    background: linear-gradient(90deg, #7a5208, #b8860b, #d4a820, #b8860b, #7a5208);
    padding: 11px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-term-name {
    font-family: 'Playfair Display', serif;
    color: #0e0c0a;
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
  }

  .back-era-tag {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 9px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    color: #fff8e0;
    white-space: nowrap;
